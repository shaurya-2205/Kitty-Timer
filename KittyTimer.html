<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hello Kitty Study Timer</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
/* ðŸŽ€ Hello Kitty Study Timer Styles - Wide Pill Layout ðŸŽ€ */

:root {
    /* Color Palette matching Reference Image */
    --top-bar-bg: #FFAEC2;
    --bg-grad-start: #FFDDE6;
    --bg-grad-end: #FFF5F7;  /* light cream pink */
    
    /* Text Colors */
    --text-pink-title: #FFFFFF;
    --text-pink-time: #F48BAC;
    --text-brown: #664A4A;
    
    /* Timer Card */
    --card-track: #FFDFE6;
    --card-fill: #FF9EBB;
    
    /* Buttons */
    --btn-pink-bg: #FFA3BA;
    --btn-blue-bg: #A3D1FF;
    --btn-gray-bg: #D1D1D1;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(180deg, var(--bg-grad-start) 0%, rgb(255, 246, 244) 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="%23FF6B81" d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,5A7,7 0 0,1 19,12A7,7 0 0,1 12,19A7,7 0 0,1 5,12A7,7 0 0,1 12,5Z" /></svg>') 12 12, auto;
    transition: background 0.8s ease;
}

/* Background State Overrides */
body.mode-study { background: linear-gradient(180deg, #FFDDE6 0%, #FFF5F7 100%); }
body.mode-short-break { background: linear-gradient(180deg, #E8F5E9 0%, #F1F8E9 100%); }
body.mode-long-break { background: linear-gradient(180deg, #E1BEE7 0%, #F3E5F5 100%); }

.top-bar {
    width: 100%;
    background-color: var(--top-bar-bg);
    padding: 10px 0;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

.top-bar-content {
    display: flex;
    align-items: center;
    gap: 12px;
}

.header-icon {
    width: 44px;
    height: 44px;
    object-fit: contain;
}

.header-title {
    font-size: 2rem;
    font-weight: 900;
    color: var(--text-pink-title);
    text-shadow: 
      -1px -1px 0 #F48BAC, 1px -1px 0 #F48BAC, -1px 1px 0 #F48BAC, 1px 1px 0 #F48BAC,
      0 3px 0px #F48BAC, 0 4px 8px rgba(244, 139, 172, 0.4);
    letter-spacing: 1px;
}

.app-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    position: relative;
    z-index: 5;
    gap: 1.5rem;
    margin-top: -30px; /* Offset to center slightly above absolute vertical mid */
}

.timer-wrapper {
    position: relative;
    margin: 20px 0;
}

.timer-card {
    position: relative;
    width: 500px;
    height: 240px;
    background: #FFFFFF;
    border-radius: 120px; /* Strong Pill Shape */
    box-shadow: 0 10px 30px rgba(255, 174, 194, 0.2), 0 0 0 6px #FFF, 0 0 0 12px rgba(255, 230, 235, 0.7);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 2;
}

.progress-svg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 500px; /* Match Card width */
    height: 240px; /* Match Card height */
    z-index: -1; 
    pointer-events: none;
}

.progress-track {
    fill: none;
    stroke: var(--card-track);
    stroke-width: 14;
}

.progress-fill {
    fill: none;
    stroke: var(--card-fill);
    stroke-width: 14;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear;
}

.session-info {
    font-size: 1.3rem;
    font-weight: 800;
    color: var(--text-brown);
    margin-top: -15px;
    margin-bottom: 5px;
}

.time-display {
    font-size: 6.5rem;
    font-weight: 900;
    color: var(--text-pink-time);
    line-height: 1;
    letter-spacing: 2px;
}

.mascot-image {
    position: absolute;
    right: -75px; /* Overlap right side bounding box */
    bottom: -15px; 
    height: 180px;
    z-index: 3;
    filter: drop-shadow(0px 8px 15px rgba(0,0,0,0.1));
}

.mascot-idle { animation: float 4s ease-in-out infinite; }
.mascot-tea { animation: float-slow 5s ease-in-out infinite; }

.controls-row {
    display: flex;
    gap: 16px;
    margin-top: 5px;
}

.btn {
    font-family: 'Nunito', sans-serif;
    font-size: 1.25rem;
    font-weight: 800;
    color: #FFFFFF;
    padding: 10px 32px;
    border-radius: 40px;
    border: 4px solid #FFFFFF;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 5px 12px rgba(0,0,0,0.06);
    outline: none;
}

.btn:active:not(:disabled) { transform: translateY(3px); }
.btn:hover:not(:disabled) { filter: brightness(1.05); }

/* Custom Backgrounds for reference image style */
.btn-pink { background-color: var(--btn-pink-bg); }
.btn-blue { background-color: var(--btn-blue-bg); }
.btn-gray { background-color: var(--btn-gray-bg); }

/* Dimmed / visually inactive styling */
.btn.disabled-btn {
    opacity: 0.8;
    background-color: var(--btn-gray-bg);
    cursor: not-allowed;
    transform: translateY(0);
}

.tracker-box {
    background: #FFFFFF;
    padding: 10px 24px;
    border-radius: 40px;
    border: 3px solid #FFEDF1;
    display: flex;
    align-items: center;
    position: relative;
    box-shadow: 0 4px 10px rgba(255, 174, 194, 0.15);
    min-width: 250px;
    justify-content: center;
}

.tracker-bg-line {
    position: absolute;
    top: 50%;
    left: 40px;
    right: 40px;
    height: 8px;
    background-color: #FFEDF1;
    transform: translateY(-50%);
    z-index: 1;
    border-radius: 4px;
}

.strawberry-container {
    display: flex;
    justify-content: space-between;
    width: 200px;
    z-index: 2;
}

.strawberry-wrap {
    width: 34px;
    height: 34px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.strawberry {
    width: 30px;
    height: 30px;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    filter: drop-shadow(1px 2px 3px rgba(0,0,0,0.15));
}

.strawberry.empty {
    opacity: 0.3;
    filter: grayscale(100%);
    transform: scale(0.85);
}

/* Background Decor Elements */
.bg-decor {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 1;
}

.star {
    position: absolute;
    width: 22px;
    height: 22px;
    animation: float-star 5s ease-in-out infinite alternate;
}

/* Creating the cute 4-point star shapes with CSS */
.star::before {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: inherit;
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
}

.star.yellow { background: #FFEA98; }
.star.purple { background: #DDC8FE; }
.star.green  { background: #D1F2D6; }

@keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
}

@keyframes float-slow {
    0%, 100% { transform: translateY(0px) scale(0.98); }
    50% { transform: translateY(-5px) scale(1.0); }
}

@keyframes float-star {
    0% { transform: translateY(0px) rotate(-10deg) scale(0.8); opacity: 0.8;  }
    100% { transform: translateY(-15px) rotate(15deg) scale(1.2); opacity: 1; }
}

    </style>
</head>

    <script>
/* ðŸŽ€ Hello Kitty Study Timer Logic ðŸŽ€ */

// --- Constants & Config ---
const CONFIG = {
    STUDY_TIME: 25 * 60, // 25 minutes
    SHORT_BREAK: 5 * 60,  // 5 minutes
    LONG_BREAK: 15 * 60, // 15 minutes
    SESSIONS_BEFORE_LONG_BREAK: 4
};

const MODES = {
    STUDY: 'study',
    SHORT_BREAK: 'short-break',
    LONG_BREAK: 'long-break'
};

// --- State ---
let state = {
    timer: null,
    timeLeft: CONFIG.STUDY_TIME,
    isActive: false,
    currentMode: MODES.STUDY,
    sessionCount: 0 // Completed study sessions
};

// --- DOM Elements ---
const el = {
    timeText: document.getElementById('timeText'),
    sessionText: document.getElementById('sessionText'),
    startBtn: document.getElementById('startBtn'),
    pauseBtn: document.getElementById('pauseBtn'),
    resetBtn: document.getElementById('resetBtn'),
    mascotImage: document.getElementById('mascotImage'),
    timerCard: document.getElementById('timerCard'),
    progressRect: document.getElementById('progressRect'),
    strawberries: document.querySelectorAll('.strawberry'),
    body: document.body
};

// --- Progress Setup ---
let SVGRectLength = 0;

function setupSVGProgress() {
    SVGRectLength = el.progressRect.getTotalLength();
    el.progressRect.style.strokeDasharray = `${SVGRectLength} ${SVGRectLength}`;
    el.progressRect.style.strokeDashoffset = SVGRectLength; // Start empty (or trace back)
}

function setProgress(percent) {
    if(!SVGRectLength) setupSVGProgress();
    const offset = SVGRectLength - (percent / 100) * SVGRectLength;
    el.progressRect.style.strokeDashoffset = offset;
}

// --- Initialization ---
function init() {
    setupSVGProgress();
    loadState();
    updateDisplay();
    updateStrawberryTracker();
    updateButtonsState();
    createStars();
    
    // Event Listeners
    el.startBtn.addEventListener('click', () => { playButtonSound(); startTimer(); });
    el.pauseBtn.addEventListener('click', () => { playButtonSound(); pauseTimer(); });
    el.resetBtn.addEventListener('click', () => { playButtonSound(); resetTimer(); });
    
    // Developer tool to fast forward time
    window.fastForward = () => { if(state.isActive) { state.timeLeft = 2; } };
}

// --- Persistence ---
function saveState() {
    localStorage.setItem('kittyTimerState', JSON.stringify({
        sessionCount: state.sessionCount
    }));
}

function loadState() {
    const saved = localStorage.getItem('kittyTimerState');
    if (saved) {
        try {
            const parsed = JSON.parse(saved);
            state.sessionCount = parsed.sessionCount || 0;
            if (state.sessionCount >= CONFIG.SESSIONS_BEFORE_LONG_BREAK) {
                state.sessionCount = 0;
            }
        } catch (e) { console.error('Error loading state'); }
    }
}

// --- Timer Logic ---
function startTimer() {
    if (state.isActive) return;
    state.isActive = true;
    
    updateButtonsState();
    
    state.timer = setInterval(() => {
        state.timeLeft--;
        updateDisplay();
        
        if (state.timeLeft <= 0) {
            handleSessionEnd();
        }
    }, 1000);
}

function pauseTimer() {
    if (!state.isActive) return;
    
    state.isActive = false;
    clearInterval(state.timer);
    updateButtonsState();
}

function resetTimer() {
    pauseTimer();
    setMode(MODES.STUDY);
}

// --- Dynamic Buttons Mapping ---
function updateButtonsState() {
    if (state.isActive) {
        // Running: Pause (Pink) | Reset (Blue) | Start (Gray/Disabled)
        el.startBtn.className = 'btn btn-gray disabled-btn';
        el.startBtn.disabled = true;
        
        el.pauseBtn.className = 'btn btn-pink';
        el.pauseBtn.disabled = false;
        
        el.resetBtn.className = 'btn btn-blue';
        el.resetBtn.disabled = false;
    } else {
        // Paused/Idle: Pause (Gray/Disabled) | Reset (Blue) | Start (Pink)
        el.startBtn.className = 'btn btn-pink';
        el.startBtn.disabled = false;
        
        el.pauseBtn.className = 'btn btn-gray disabled-btn';
        el.pauseBtn.disabled = true;
        
        el.resetBtn.className = 'btn btn-blue';
        el.resetBtn.disabled = false;
    }
}


// --- Session End Logic ---
function handleSessionEnd() {
    pauseTimer();
    playNotificationSound();
    
    if (state.currentMode === MODES.STUDY) {
        state.sessionCount++;
        saveState();
        updateStrawberryTracker();
        triggerConfetti();
        
        if (state.sessionCount >= CONFIG.SESSIONS_BEFORE_LONG_BREAK) {
            setMode(MODES.LONG_BREAK);
        } else {
            setMode(MODES.SHORT_BREAK);
        }
    } else {
        if (state.currentMode === MODES.LONG_BREAK) {
            state.sessionCount = 0;
            saveState();
            updateStrawberryTracker();
        }
        setMode(MODES.STUDY);
    }
}

// --- UI Updates ---
function updateDisplay() {
    const minutes = Math.floor(state.timeLeft / 60);
    const seconds = state.timeLeft % 60;
    const timeString = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    
    el.timeText.textContent = timeString;
    document.title = `(${timeString}) Hello Kitty Timer`;
    
    // Ensure header title is accurate as we initialize
    if (state.currentMode === MODES.STUDY && el.sessionText.textContent.includes("Session")) {
        el.sessionText.textContent = `Focus Session: ${(state.sessionCount % 4) + 1} / 4`;
    }
    
    let totalTime;
    if (state.currentMode === MODES.STUDY) totalTime = CONFIG.STUDY_TIME;
    else if (state.currentMode === MODES.SHORT_BREAK) totalTime = CONFIG.SHORT_BREAK;
    else totalTime = CONFIG.LONG_BREAK;
    
    const percentage = ((totalTime - state.timeLeft) / totalTime) * 100;
    setProgress(Math.max(0, Math.min(100, percentage)));
}

function updateStrawberryTracker() {
    el.strawberries.forEach((strawberry, index) => {
        if (index < state.sessionCount) {
            strawberry.classList.remove('empty');
            strawberry.style.transform = 'scale(1.1)';
            setTimeout(() => strawberry.style.transform = '', 300);
        } else {
            strawberry.classList.add('empty');
        }
    });
}

function triggerConfetti() {
    if (typeof confetti === 'function') {
        const duration = 2500;
        const end = Date.now() + duration;

        (function frame() {
            confetti({
                particleCount: 4,
                angle: 60,
                spread: 55,
                origin: { x: 0 },
                colors: ['#FFB6C1', '#FFFFFF', '#FFEA98']
            });
            confetti({
                particleCount: 4,
                angle: 120,
                spread: 55,
                origin: { x: 1 },
                colors: ['#FFB6C1', '#FFFFFF', '#FFEA98']
            });

            if (Date.now() < end) requestAnimationFrame(frame);
        }());
    }

function playButtonSound() {
    buttonSound.currentTime = 0;

function playNotificationSound() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gainNode = ctx.createGain();
        
        osc.connect(gainNode);
        gainNode.connect(ctx.destination);
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1760, ctx.currentTime + 0.1);
        
        gainNode.gain.setValueAtTime(0, ctx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.1, ctx.currentTime + 0.05);
        gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5);
        
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 1.5);
    } catch (e) { }
}

function createStars() {
    const container = document.getElementById('starsContainer');
    const colors = ['yellow', 'purple', 'yellow', 'green', 'yellow'];
    
    for (let i = 0; i < 12; i++) {
        const star = document.createElement('div');
        star.className = `star ${colors[i % colors.length]}`;
        
        star.style.left = `${10 + Math.random() * 80}%`;
        star.style.top = `${10 + Math.random() * 80}%`;
        star.style.animationDelay = `${Math.random() * 5}s`;
        
        container.appendChild(star);
    }
}
