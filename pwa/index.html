<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hello Kitty Study Timer 🎀</title>

    <!-- PWA Meta Tags -->
    <meta name="description" content="A super cute Pomodoro study timer with Hello Kitty aesthetic">
    <meta name="theme-color" content="#FFB6C1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kitty Timer">
    <link rel="apple-touch-icon" href="assets/icons/icon-512.png">

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Google Fonts for Nunito -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Main CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="top-bar">
        <div class="top-bar-content">
            <img src="assets/images/kitty_head.png" alt="Icon" class="header-icon">
            <h1 class="header-title">Hello Kitty Study Timer</h1>
        </div>
    </div>

    <!-- Floating Background Decor -->
    <div class="bg-decor container-decor" id="starsContainer"></div>

    <main class="app-main">
        <div class="timer-wrapper">
            <div class="timer-card" id="timerCard">
                <div class="session-info" id="sessionText">Focus Session: 1 / 4</div>
                <div class="time-display" id="timeText">25:00</div>
                
                <!-- SVG Pill Progress Bar -->
                <svg class="progress-svg" viewBox="0 0 500 240">
                    <rect x="10" y="10" width="480" height="220" rx="110" ry="110" class="progress-track" />
                    <!-- The progress rect length defaults will be set by JS via getTotalLength() -->
                    <rect x="10" y="10" width="480" height="220" rx="110" ry="110" class="progress-fill" id="progressRect" />
                </svg>
            </div>
            
            <!-- Mascot image overlapping the card perfectly -->
            <img id="mascotImage" src="assets/images/kitty_study.png" alt="Mascot" class="mascot-image mascot-idle">
        </div>
        
        <div class="controls-row">
            <button id="pauseBtn" class="btn btn-gray disabled-btn" disabled>Pause</button>
            <button id="resetBtn" class="btn btn-blue">Reset</button>
            <button id="startBtn" class="btn btn-pink">Start</button>
        </div>

        <div class="tracker-box">
            <div class="tracker-bg-line"></div>
            <div class="strawberry-container" id="tracker">
                <div class="strawberry-wrap"><img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍓</text></svg>" class="strawberry empty" /></div>
                <div class="strawberry-wrap"><img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍓</text></svg>" class="strawberry empty" /></div>
                <div class="strawberry-wrap"><img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍓</text></svg>" class="strawberry empty" /></div>
                <div class="strawberry-wrap"><img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍓</text></svg>" class="strawberry empty" /></div>
            </div>
        </div>
    </main>

    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Main JS -->
    <script src="js/script.js"></script>

    <!-- Register Service Worker for PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(reg => console.log('🎀 Service Worker registered!', reg.scope))
                    .catch(err => console.warn('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
